<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background -->
  <rect width="512" height="512" fill="#0a0e1a"/>

  <!-- subtle grid -->
  <g stroke="#6dd3fa" stroke-width="1" opacity="0.08">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- outer frame -->
  <rect x="48" y="48" width="416" height="416" fill="none" stroke="#2a3a5c" stroke-width="4"/>

  <!-- corner brackets (cyan) -->
  <path d="M48 96 L48 48 L96 48" fill="none" stroke="#6dd3fa" stroke-width="6" stroke-linecap="square"/>
  <path d="M464 96 L464 48 L416 48" fill="none" stroke="#6dd3fa" stroke-width="6" stroke-linecap="square"/>
  <path d="M48 416 L48 464 L96 464" fill="none" stroke="#6dd3fa" stroke-width="6" stroke-linecap="square"/>
  <path d="M464 416 L464 464 L416 464" fill="none" stroke="#6dd3fa" stroke-width="6" stroke-linecap="square"/>

  <!-- corner brackets (violet inner) -->
  <path d="M76 116 L76 76 L116 76" fill="none" stroke="#b388ff" stroke-width="3" stroke-linecap="square"/>
  <path d="M436 116 L436 76 L396 76" fill="none" stroke="#b388ff" stroke-width="3" stroke-linecap="square"/>

  <!-- HUD title -->
  <text x="256" y="220" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="96" font-weight="700" fill="#6dd3fa" text-anchor="middle" letter-spacing="12">HUD</text>

  <!-- subtitle -->
  <text x="256" y="280" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="28" font-weight="400" fill="#6a7896" text-anchor="middle" letter-spacing="8">// COMPANY</text>

  <!-- progress dots -->
  <g fill="#6dfa9c">
    <circle cx="216" cy="370" r="6"/>
    <circle cx="240" cy="370" r="6"/>
    <circle cx="264" cy="370" r="6"/>
  </g>
  <g fill="#2a3a5c">
    <circle cx="288" cy="370" r="6"/>
    <circle cx="312" cy="370" r="6"/>
  </g>

  <!-- bottom accent bar -->
  <line x1="180" y1="410" x2="332" y2="410" stroke="#ffb84d" stroke-width="2"/>
  <text x="256" y="440" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="18" fill="#cfd8e8" text-anchor="middle" letter-spacing="4">v0.1.0</text>
</svg>
